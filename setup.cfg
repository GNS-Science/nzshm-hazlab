[mypy]
follow_untyped_imports = True

[coverage:run]
omit = nzshm_hazlab/data/data_loaders/data_loader.py, */__init__.py
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    class .*\bProtocol\):
    if TYPE_CHECKING:


[tox:tox]
isolated_build = true
envlist = py311, py312, format, lint, build-linux, build-macos, audit

[gh-actions]
python =
    3.12: py312
    3.11: py311, format, lint, build

[testenv]
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
dependency_groups = dev
commands =
    pytest --cov=nzshm_hazlab --cov-branch --cov-report=xml --cov-report=term-missing tests nzshm_hazlab

[testenv:audit]
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project -o audit.txt
    pip-audit -r audit.txt --require-hashes
    safety scan

[testenv:format]
dependency_groups = dev
commands =
    ruff format nzshm_hazlab tests

[testenv:format-check]
dependency_groups = dev
commands =
    ruff format --check nzshm_hazlab tests

[testenv:lint]
dependency_groups = dev
commands =
    ruff check nzshm_hazlab tests
    mypy nzshm_hazlab tests

[testenv:build-linux]
platform = linux
dependency_groups = dev
commands =
    uv build

[testenv:build-macos]
platform = darwin
dependency_groups = dev
commands =
    uv build
