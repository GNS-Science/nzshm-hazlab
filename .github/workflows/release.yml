# Publish package on main branch if it's tagged with 'v*'

name: release & publish workflow

on:
  push:
    tags:
      - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


jobs:
  verify-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify ref is a v* tag and CHANGELOG.md has a matching section
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "::error::Release workflow must be run from a v* tag. Got ref ${GITHUB_REF}." >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## [${VERSION}]' section for tag ${GITHUB_REF_NAME}. Add one before tagging." >&2
            exit 1
          fi

  release-and-distribute:
    needs: verify-changelog
    uses: GNS-Science/nshm-github-actions/.github/workflows/python-release-uv.yml@main
    with:
      python-version: '3.12'
    secrets: inherit

  deploy-docs:
    needs: verify-changelog
    uses: GNS-Science/nshm-github-actions/.github/workflows/python-deploy-docs-uv.yml@main
    with:
      python-version: '3.12'
      optional-dependency-groups: doc
    secrets: inherit
